    Research Experience:
      - company: ALMaS Research Group, Worcester Polytechnic Institute
        position: Graduate Researcher — ReSCoT-Q, Reference-Guided Surface-Frame Control
        location: Worcester, MA
        start_date: 2025-08
        end_date: present
        summary: "Advisor: Dr. Mahdi Agheli"
        highlights:
          - Developed ReSCoT-Q, a surface-frame MPC and weighted whole-body controller (OCS2 SQP, 100 Hz)
            for force-controlled tool sliding on a Unitree Go1 with a body-mounted tool and force/torque
            sensor, resolving contact into normal-force regulation, tangential-slide tracking, and
            cross-track stabilization.
          - Designed a confidence-gated estimator fusing a nominal surface prior with online contact-wrench
            and tool-motion measurements, and a contact-stability supervisor gating sliding during contact
            acquisition, force recovery, and gait-induced dropouts.
          - Demonstrated 109.9 s of sustained hardware contact spanning a 91.3° arc of a cylindrical test
            surface, with 0.60 N normal-force RMS and 18.8 mm tracking RMS error at a 10 N target, despite
            a ~10% radius error in the surface prior.

      - company: ALMaS Research Group, Worcester Polytechnic Institute
        position: Graduate Researcher — GaitNet, Learning-Based Acyclic Footstep Planning
        location: Worcester, MA
        start_date: 2025-11
        end_date: 2026-05
        summary: "Advisor: Dr. Mahdi Agheli"
        highlights:
          - Co-developed (with O. Sullivan) a hybrid learning–control footstep planner for Unitree Go1
            acyclic locomotion over irregular terrain, combining leg-specific foothold cost-map prediction
            with reinforcement-learning-based gait selection and model-based quadruped control.
          - Owned the simulation deployment stack — ROS integration of the planner with OCS2 perceptive MPC
            (foot-placement and collision constraints) and GPU elevation mapping from onboard depth sensing.
          - Implemented terrain-aware footstep candidate generation using robot state, commanded velocity,
            and raycast heightmaps, enabling real-time filtering and ranking of feasible leg-selection,
            foot-displacement, and swing-duration actions.
          - Evaluated GaitNet in NVIDIA Isaac Lab across commanded velocities and missing-step terrain
            difficulties, achieving 69.4% survival versus 25.6% for a single-leg motion-planner baseline.

      - company: NIT Trichy
        position: Undergraduate Researcher — TOTO, Autonomous Mobile Robot
        location: Tiruchirappalli, India
        start_date: 2024-09
        end_date: 2025-05
