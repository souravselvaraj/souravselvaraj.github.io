    Selected Projects:
      - name: Emergent Ice-Skating Locomotion for Humanoids via Blade-Contact RL
        start_date: 2026-07
        end_date: present
        summary: >-
          Training a Unitree G1 to ice-skate on passive 3 mm knife-edge blades with PPO in MuJoCo — no
          motion capture or imitation data; skating emerges from anisotropic blade–ice contact (elliptic
          friction cones) and a reward separating forward glide from penalized lateral slip.
        highlights:
          - Engineered for hardware transfer — asymmetric actor–critic with privileged blade velocities
            (critic-only), a staged 0.15–1.2 m/s speed curriculum, ungated slip penalties closing
            reward-hacking exploits, and domain randomization over PD gains, inertia, payload, actuator
            delay, and blade mounting.
          - In simulation, current policies track a 0.9 m/s command within 0.09 m/s at 94% single-support,
            holding lateral blade slip to 2–4 cm/s and gliding up to 70% of stance.

      - name: Human-Like Bimanual Lifting for Humanoids via Residual AMP–PPO
        start_date: 2026-05
        end_date: 2026-07
        summary: >-
          Trained a Unitree G1 to squat, grasp, and carry objects bimanually in MuJoCo via a residual
          policy over a frozen locomotion actor, with an AMP discriminator on human mocap as a capped
          style regularizer so imitation never outpays task completion.
        highlights:
          - Stabilized training with success-adaptive curricula annealing a virtual object assist, an
            asymmetric actor–critic with privileged contact forces, noisy object-state observations, and
            domain randomization over object mass, friction, CoM, and base pushes.
          - Closed successive reward-hacking exploits via gated posture penalties; converged policies
            consistently hold objects at goal height, centered within 3 cm, with human-like posture.

      - name: Conditional Flow Matching Policies for Robot Manipulation
        start_date: 2026-04
        end_date: 2026-05
        summary: >-
          Implemented a Conditional Flow Matching (CFM) visuomotor policy from scratch in robomimic —
          Diffusion Policy's receding-horizon architecture with iterative denoising replaced by a learned
          ODE velocity field integrated in 10 Euler steps.
        highlights:
          - Achieved 26.7 ms per action chunk at inference, an 11× speedup over the default 100-step DDPM
            Diffusion Policy on an identical 65M-parameter backbone; ran solver and inference-step
            ablations (Euler/midpoint, 10–50 steps) against Diffusion Policy baselines.
          - Benchmarked on 5 robomimic tasks (3 seeds, 50 rollouts each), matching or beating BC-RNN
            references on 4/5 — 100% lift, 94% can, 84% vs. 71% two-arm transport, 64% tool_hang.

      - name: Acrobatic Quadrotor Flight using Geometric Control and L1 Adaptive Augmentation
        start_date: 2025-10
        end_date: 2025-12
        summary: >-
          Implemented an SE(3) geometric controller with L1 adaptive augmentation on a Crazyflie 2.1 in
          ROS 2 simulation (hover, zero-radius flip, recovery), achieving 2.2 cm position-tracking RMSE
          and rejecting up to 94% of force-step disturbances.

      - name: Autonomous Rover — ISRO Robotics Challenge 2024
        start_date: 2022-12
        end_date: 2024-08
        summary: >-
          Led a 10-member team building a 6-wheeled rocker-bogie autonomous rover with ORB-SLAM terrain
          mapping (Intel RealSense D435i), kinodynamic path planning, and custom position/speed-control
          electronics.

