        highlights:
          - Built an autonomous mobile robot combining ICP-based SLAM with an Iterated Kalman Filter fusing
            wheel-encoder and RPLiDAR measurements for real-time mapping and localization.
          - Achieved ±2% velocity-tracking error on uneven terrain with closed-loop speed control.

